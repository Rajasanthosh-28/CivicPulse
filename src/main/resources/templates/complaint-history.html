<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Complaint History')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: sidebar('history')}"></nav>
    <header th:replace="~{fragments/layout :: navbar}"></header>
    <div th:replace="~{fragments/layout :: toasts}"></div>
    
    <main class="main-content container-fluid py-4">
        <!-- Page Header -->
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
            <div>
                <h1 class="h3 fw-bold mb-1">Complaint History</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/citizen-dashboard}">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">History</li>
                    </ol>
                </nav>
            </div>
            <div>
                <a th:href="@{/complaint-form}" class="btn btn-primary shadow-sm">
                    <i class="bi bi-plus-lg me-1"></i> New Complaint
                </a>
            </div>
        </div>

        <!-- Card containing Toolbar & Table -->
        <div class="card border-0 shadow-sm">
            <!-- Toolbar -->
            <div class="card-header bg-transparent border-bottom p-4">
                <div class="row g-3 align-items-center justify-content-between">
                    <div class="col-12 col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" id="tableSearchInput" class="form-control bg-light border-start-0" placeholder="Search by ID, Title, or Category...">
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <select id="statusFilterDropdown" class="form-select bg-light">
                            <option value="ALL">All Statuses</option>
                            <option value="Pending">Pending</option>
                            <option value="Assigned">Assigned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Resolved">Resolved</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table data-table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Complaint ID</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th class="pe-4 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="complaintsTableBody">
                            <tr th:each="c : ${complaints}" th:if="${complaints != null and !complaints.empty}">
                                <td class="ps-4 fw-bold text-primary" th:text="${c.complaintUid != null ? c.complaintUid : '#' + c.id}">CP-20260708-0001</td>
                                <td>
                                    <a th:href="@{/complaints/{id}(id=${c.id})}" class="fw-semibold text-dark text-decoration-none" th:text="${c.title}">Sample Complaint Title</a>
                                </td>
                                <td th:text="${c.category}">Roads</td>
                                <td>
                                    <span class="badge" th:classappend="${c.priority == 'URGENT' or c.priority == 'HIGH' ? 'bg-danger' : (c.priority == 'MEDIUM' ? 'bg-warning text-dark' : 'bg-secondary')}" th:text="${c.priority}">MEDIUM</span>
                                </td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${c.status == 'Resolved' or c.status == 'Closed' ? 'badge-resolved bg-success' : (c.status == 'In Progress' ? 'badge-in-progress bg-primary' : (c.status == 'Assigned' ? 'badge-assigned bg-info' : 'badge-pending bg-warning text-dark'))}"
                                          th:text="${c.status}">Pending</span>
                                </td>
                                <td class="text-muted small" th:text="${c.createdAt != null ? #temporals.format(c.createdAt, 'dd MMM yyyy') : 'N/A'}">08 Jul 2026</td>
                                <td class="pe-4 text-end">
                                    <div class="d-flex justify-content-end align-items-center gap-2">
                                        <a th:href="@{/complaints/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary" title="View Details">
                                            <i class="bi bi-eye"></i> View
                                        </a>
                                        <form th:if="${c.status == 'Pending'}" th:action="@{/complaints/{id}/delete(id=${c.id})}" method="post" class="m-0 d-inline" onsubmit="return confirm('Are you sure you want to delete this pending complaint?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete Complaint">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr id="emptyRow" th:if="${complaints == null or complaints.empty}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-folder2-open display-4 d-block mb-2 text-secondary"></i>
                                    No complaints found in your history.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination Controls -->
            <div class="card-footer bg-transparent border-top p-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="small text-muted">
                    Showing <span id="visibleRowCount" th:text="${complaints != null ? complaints.size() : 0}">0</span> entries
                </div>
                <nav aria-label="Complaint history pagination">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled" th:classappend="${currentPage == null or currentPage <= 1 ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/complaint-history(page=${currentPage != null ? currentPage - 1 : 1})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item" th:classappend="${totalPages != null and totalPages > 1 ? '' : 'disabled'}">
                            <a class="page-link" th:href="@{/complaint-history(page=2)}">2</a>
                        </li>
                        <li class="page-item" th:classappend="${totalPages != null and totalPages > 1 ? '' : 'disabled'}">
                            <a class="page-link" th:href="@{/complaint-history(page=${currentPage != null ? currentPage + 1 : 2})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>
    
    <div th:replace="~{fragments/layout :: scripts}"></div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('tableSearchInput');
        const statusFilter = document.getElementById('statusFilterDropdown');
        const tableBody = document.getElementById('complaintsTableBody');
        const visibleCountEl = document.getElementById('visibleRowCount');

        function filterTable() {
            if (!tableBody) return;
            const rows = tableBody.querySelectorAll('tr:not(#emptyRow)');
            const query = (searchInput?.value || '').toLowerCase().trim();
            const status = statusFilter?.value || 'ALL';
            let visibleRows = 0;

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                const statusBadge = row.querySelector('.badge');
                const rowStatus = statusBadge ? statusBadge.innerText.trim() : '';

                const matchesQuery = !query || text.includes(query);
                const matchesStatus = status === 'ALL' || rowStatus.equalsIgnoreCase(status) || rowStatus === status;

                if (matchesQuery && matchesStatus) {
                    row.style.display = '';
                    visibleRows++;
                } else {
                    row.style.display = 'none';
                }
            });

            if (visibleCountEl) visibleCountEl.innerText = visibleRows;
        }

        if (searchInput) searchInput.addEventListener('input', filterTable);
        if (statusFilter) statusFilter.addEventListener('change', filterTable);
    });
    </script>
</body>
</html>
