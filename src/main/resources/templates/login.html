<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to CivicPulse — Smart Citizen Complaint Management System. Access your dashboard as a Citizen, Officer, or Admin.">
    <title>Login | CivicPulse</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Login Page Styles -->
    <link th:href="@{/css/login-style.css}" href="/css/login-style.css" rel="stylesheet">
</head>
<body class="fade-in">

    <!-- Animated Background -->
    <div class="bg-animated">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
    </div>

    <!-- Back to Home Button -->
    <a href="/" class="back-home-float" id="backHomeBtn">
        <i class="bi bi-arrow-left"></i>
        <span>Home</span>
    </a>

    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" id="darkModeToggle" type="button" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill"></i>
        <i class="bi bi-sun-fill"></i>
    </button>

    <!-- Main Login Wrapper -->
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Branding -->
            <div class="brand-section">
                <div class="brand-icon">
                    <i class="bi bi-shield-check"></i>
                </div>
                <h1 class="brand-title">Welcome to CivicPulse</h1>
                <p class="brand-subtitle">Smart Citizen Complaint Management System</p>
            </div>

            <!-- Error Alert (Thymeleaf) -->
            <div th:if="${errorMessage}" class="alert-custom alert-error" id="errorAlert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}">An error occurred.</span>
            </div>

            <!-- Success Alert (Thymeleaf) -->
            <div th:if="${successMessage}" class="alert-custom alert-success" id="successAlert">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${successMessage}">Success!</span>
            </div>

            <!-- Role Tabs -->
            <div class="role-tabs" role="tablist">
                <button class="role-tab active" data-role="citizen" type="button" role="tab" id="tabCitizen" aria-selected="true">
                    <i class="bi bi-person"></i> Citizen
                </button>
                <button class="role-tab" data-role="officer" type="button" role="tab" id="tabOfficer" aria-selected="false">
                    <i class="bi bi-briefcase"></i> Officer
                </button>
                <button class="role-tab" data-role="admin" type="button" role="tab" id="tabAdmin" aria-selected="false">
                    <i class="bi bi-gear"></i> Admin
                </button>
            </div>

            <!-- ==================== CITIZEN FORM ==================== -->
            <div class="role-form active" id="form-citizen" role="tabpanel">
                <form action="/login" method="post" id="citizenLoginForm">
                    <div class="form-group">
                        <label for="citizenEmail">Email Address</label>
                        <div class="input-wrapper">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email"
                                   id="citizenEmail"
                                   name="email"
                                   class="form-input"
                                   placeholder="Enter your email"
                                   required
                                   autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="citizenPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password"
                                   id="citizenPassword"
                                   name="password"
                                   class="form-input has-toggle password-input"
                                   placeholder="Enter your password"
                                   required
                                   autocomplete="current-password">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar"><div class="strength-fill"></div></div>
                            <span class="strength-text"></span>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me" for="citizenRemember">
                            <input type="checkbox" id="citizenRemember" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-login" id="citizenLoginBtn">
                        <span class="btn-text">Sign In as Citizen</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>

            <!-- ==================== OFFICER FORM ==================== -->
            <div class="role-form" id="form-officer" role="tabpanel">
                <form action="/officer-login" method="post" id="officerLoginForm">
                    <div class="form-group">
                        <label for="officerEmail">Officer Email</label>
                        <div class="input-wrapper">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email"
                                   id="officerEmail"
                                   name="email"
                                   class="form-input"
                                   placeholder="Enter officer email"
                                   required
                                   autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="officerPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password"
                                   id="officerPassword"
                                   name="password"
                                   class="form-input has-toggle password-input"
                                   placeholder="Enter officer password"
                                   required
                                   autocomplete="current-password">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar"><div class="strength-fill"></div></div>
                            <span class="strength-text"></span>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me" for="officerRemember">
                            <input type="checkbox" id="officerRemember" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-login" id="officerLoginBtn">
                        <span class="btn-text">Sign In as Officer</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>

            <!-- ==================== ADMIN FORM ==================== -->
            <div class="role-form" id="form-admin" role="tabpanel">
                <form action="/admin-login" method="post" id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminEmail">Admin Email</label>
                        <div class="input-wrapper">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email"
                                   id="adminEmail"
                                   name="email"
                                   class="form-input"
                                   placeholder="Enter admin email"
                                   required
                                   autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="adminPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password"
                                   id="adminPassword"
                                   name="password"
                                   class="form-input has-toggle password-input"
                                   placeholder="Enter admin password"
                                   required
                                   autocomplete="current-password">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar"><div class="strength-fill"></div></div>
                            <span class="strength-text"></span>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me" for="adminRemember">
                            <input type="checkbox" id="adminRemember" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-login" id="adminLoginBtn">
                        <span class="btn-text">Sign In as Admin</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Create Account & Back to Home -->
            <a href="/register" class="btn-secondary-custom" id="createAccountBtn">
                <i class="bi bi-person-plus"></i>
                Create an Account
            </a>
            <a href="/" class="btn-secondary-custom btn-home" id="backHomeCardBtn">
                <i class="bi bi-house"></i>
                Back to Home
            </a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login Page Script -->
    <script th:src="@{/js/login-script.js}" src="/js/login-script.js"></script>
</body>
</html>
