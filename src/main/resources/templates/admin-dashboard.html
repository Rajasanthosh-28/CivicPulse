<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | CivicPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Poppins',sans-serif;background:#f4f7fb;}</style>
</head>
<body>
<div class="container py-4">
    <h2 class="fw-bold">Admin Dashboard</h2>
    <p class="text-muted">Monitor governance performance and manage operations.</p>

    <div class="row g-4 mt-2">
        <div class="col-md-2"><div class="card p-3"><h6>Total Citizens</h6><h3 th:text="${citizens}"></h3></div></div>
        <div class="col-md-2"><div class="card p-3"><h6>Pending</h6><h3 th:text="${pending}"></h3></div></div>
        <div class="col-md-2"><div class="card p-3"><h6>Assigned</h6><h3 th:text="${assigned}"></h3></div></div>
        <div class="col-md-2"><div class="card p-3"><h6>In Progress</h6><h3 th:text="${inProgress}"></h3></div></div>
        <div class="col-md-2"><div class="card p-3"><h6>Resolved</h6><h3 th:text="${resolved}"></h3></div></div>
        <div class="col-md-2"><div class="card p-3"><h6>Closed</h6><h3 th:text="${closed}"></h3></div></div>
    </div>

    <div class="card p-4 mt-4">
        <h5>Create Officer</h5>
        <form action="/officers" method="post" class="row g-2">
            <div class="col-md-3"><input class="form-control" name="fullName" placeholder="Full Name" required></div>
            <div class="col-md-2"><input class="form-control" name="email" placeholder="Email" required></div>
            <div class="col-md-2"><input class="form-control" name="password" placeholder="Password" required></div>
            <div class="col-md-2"><input class="form-control" name="department" placeholder="Department" required></div>
            <div class="col-md-2"><input class="form-control" name="phone" placeholder="Phone"></div>
            <div class="col-md-1"><button class="btn btn-primary">Add</button></div>
        </form>
    </div>

    <div class="card p-4 mt-4">
        <h5>All Complaints</h5>
        <table class="table">
            <thead><tr><th>#</th><th>Title</th><th>Citizen</th><th>Status</th><th>Assign</th><th>Delete</th></tr></thead>
            <tbody>
            <tr th:each="complaint : ${complaints}">
                <td th:text="${complaint.id}"></td>
                <td th:text="${complaint.title}"></td>
                <td th:text="${complaint.citizen.fullName}"></td>
                <td th:text="${complaint.status}"></td>
                <td>
                    <form th:action="@{'/complaints/' + ${complaint.id} + '/assign'}" method="post" class="d-flex">
                        <input type="number" name="officerId" class="form-control form-control-sm" placeholder="Officer ID">
                        <button class="btn btn-sm btn-success ms-2">Assign</button>
                    </form>
                </td>
                <td>
                    <form th:action="@{'/complaints/' + ${complaint.id} + '/delete'}" method="post">
                        <button class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
