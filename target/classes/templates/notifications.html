<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Notifications')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: sidebar('notifications')}"></nav>
    <header th:replace="~{fragments/layout :: navbar}"></header>
    <div th:replace="~{fragments/layout :: toasts}"></div>
    
    <main class="main-content container py-4" style="max-width: 850px;">
        <!-- Page Header & Mark All as Read Button -->
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
            <div>
                <h1 class="h3 fw-bold mb-1">Notifications</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/citizen-dashboard}">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Notifications</li>
                    </ol>
                </nav>
            </div>
            <div th:if="${notifications != null and !notifications.empty}">
                <form action="/notifications/read-all" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-primary btn-sm shadow-sm d-flex align-items-center gap-1">
                        <i class="bi bi-check-all fs-5"></i> Mark All as Read
                    </button>
                </form>
            </div>
        </div>

        <!-- Notifications List -->
        <div class="card border-0 shadow-sm p-3 mb-4" th:if="${notifications != null and !notifications.empty}">
            <div class="list-group list-group-flush">
                <div th:each="notif : ${notifications}" 
                     class="list-group-item px-3 py-4 border-bottom d-flex align-items-start gap-3 transition-all"
                     th:classappend="${notif.read != null and notif.read ? 'bg-white text-muted' : 'bg-primary-subtle bg-opacity-10 fw-normal'}">
                    
                    <div class="rounded-circle p-3 d-flex align-items-center justify-content-center shadow-sm flex-shrink-0"
                         th:classappend="${notif.read != null and notif.read ? 'bg-light text-secondary' : 'bg-primary text-white'}"
                         style="width: 46px; height: 46px;">
                        <i class="bi bi-bell fs-5"></i>
                    </div>

                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center mb-1 flex-wrap gap-2">
                            <h6 class="mb-0 fw-bold" th:classappend="${notif.read != null and notif.read ? 'text-dark' : 'text-primary'}" th:text="${notif.title}">Notification Title</h6>
                            <small class="text-muted" th:text="${notif.createdAt != null ? #temporals.format(notif.createdAt, 'dd MMM yyyy, hh:mm a') : 'Just now'}">08 Jul 2026</small>
                        </div>
                        <p class="mb-2 small text-secondary" th:text="${notif.message}">Notification detailed message content goes here.</p>
                        
                        <div class="d-flex align-items-center gap-3 mt-2">
                            <a th:if="${notif.link != null}" th:href="${notif.link}" class="btn btn-link p-0 small text-decoration-none fw-semibold">
                                View Details <i class="bi bi-arrow-right small"></i>
                            </a>

                            <form th:if="${notif.read == null or !notif.read}" th:action="@{/notifications/{id}/read(id=${notif.id})}" method="post" class="m-0 ms-auto">
                                <button type="submit" class="btn btn-sm btn-light border py-1 px-2 text-primary fw-semibold" style="font-size: 0.75rem;">
                                    <i class="bi bi-check2"></i> Mark as read
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="card border-0 shadow-sm p-5 text-center my-4" th:if="${notifications == null or notifications.empty}">
            <div class="text-muted mb-3"><i class="bi bi-bell-slash display-3"></i></div>
            <h4 class="fw-bold mb-2">No new notifications</h4>
            <p class="text-muted mb-0">You are all caught up! Any status updates or civic alerts will appear here.</p>
        </div>
    </main>
    
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
