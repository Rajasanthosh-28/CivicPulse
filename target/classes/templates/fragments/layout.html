<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- HEAD fragment -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | CivicPulse'">CivicPulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/portal-style.css}" rel="stylesheet">
</head>

<!-- SIDEBAR fragment -->
<nav th:fragment="sidebar(activePage)" class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-logo">
            <i class="bi bi-shield-check"></i>
        </div>
        <span class="brand-text">CivicPulse</span>
    </div>
    
    <div class="sidebar-user" th:if="${user != null}">
        <div class="user-avatar">
            <span th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</span>
        </div>
        <div class="user-info">
            <span class="user-name" th:text="${user.fullName}">User Name</span>
            <span class="user-role">Citizen</span>
        </div>
    </div>

    <div class="sidebar-nav">
        <div class="nav-section-label">Main Menu</div>
        <a href="/citizen-dashboard" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? 'active'">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="/complaint-form" class="sidebar-link" th:classappend="${activePage == 'submit'} ? 'active'">
            <i class="bi bi-plus-circle-fill"></i> Submit Complaint
        </a>
        <a href="/complaint-history" class="sidebar-link" th:classappend="${activePage == 'history'} ? 'active'">
            <i class="bi bi-clock-history"></i> Complaint History
        </a>
        <a href="/track-complaint" class="sidebar-link" th:classappend="${activePage == 'track'} ? 'active'">
            <i class="bi bi-search"></i> Track Complaint
        </a>
        <a href="/notifications" class="sidebar-link" th:classappend="${activePage == 'notifications'} ? 'active'">
            <i class="bi bi-bell-fill"></i> Notifications
        </a>
        
        <div class="sidebar-divider"></div>
        <div class="nav-section-label">Account</div>
        
        <a href="/feedback" class="sidebar-link" th:classappend="${activePage == 'feedback'} ? 'active'">
            <i class="bi bi-chat-square-heart-fill"></i> Feedback
        </a>
        <a href="/profile" class="sidebar-link" th:classappend="${activePage == 'profile'} ? 'active'">
            <i class="bi bi-person-fill"></i> My Profile
        </a>
        <a href="/settings" class="sidebar-link" th:classappend="${activePage == 'settings'} ? 'active'">
            <i class="bi bi-gear-fill"></i> Settings
        </a>
        <a href="/help" class="sidebar-link" th:classappend="${activePage == 'help'} ? 'active'">
            <i class="bi bi-question-circle-fill"></i> Help Center
        </a>
        
        <div class="sidebar-divider"></div>
        <a href="/logout" class="sidebar-link sidebar-link-danger">
            <i class="bi bi-box-arrow-left"></i> Logout
        </a>
    </div>
    
    <div class="sidebar-footer">
        <span>CivicPulse v1.0</span>
    </div>
</nav>

<!-- NAVBAR fragment -->
<header th:fragment="navbar" class="top-navbar" id="topNavbar">
    <div class="navbar-left">
        <button class="hamburger-btn" id="hamburgerBtn" type="button">
            <i class="bi bi-list"></i>
        </button>
        <div class="navbar-search">
            <i class="bi bi-search"></i>
            <input type="text" placeholder="Search complaints, pages..." id="navbarSearch">
        </div>
    </div>
    <div class="navbar-right">
        <span class="navbar-datetime" id="liveClock"></span>
        <a href="/complaint-form" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg"></i> <span class="d-none d-md-inline">New Complaint</span>
        </a>
        <a href="/notifications" class="navbar-icon-btn" id="notifBtn">
            <i class="bi bi-bell"></i>
            <span class="notification-badge" id="notifBadge">0</span>
        </a>
        <button class="navbar-icon-btn" id="darkModeToggle" type="button">
            <i class="bi bi-moon-fill dark-icon"></i>
            <i class="bi bi-sun-fill light-icon"></i>
        </button>
        <div class="navbar-user-dropdown" th:if="${user != null}">
            <div class="navbar-user" id="userDropdownToggle">
                <div class="navbar-avatar">
                    <span th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</span>
                </div>
                <span class="d-none d-lg-inline navbar-username" th:text="${user.fullName}">User</span>
                <i class="bi bi-chevron-down d-none d-lg-inline"></i>
            </div>
            <div class="user-dropdown-menu" id="userDropdownMenu">
                <a href="/profile"><i class="bi bi-person"></i> My Profile</a>
                <a href="/settings"><i class="bi bi-gear"></i> Settings</a>
                <a href="/help"><i class="bi bi-question-circle"></i> Help</a>
                <div class="dropdown-divider"></div>
                <a href="/logout" class="text-danger"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </div>
        </div>
    </div>
</header>

<!-- TOAST CONTAINER fragment -->
<div th:fragment="toasts" class="toast-container" id="toastContainer"></div>

<!-- SCRIPTS fragment -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script th:src="@{/js/portal-script.js}"></script>
</div>

</html>
