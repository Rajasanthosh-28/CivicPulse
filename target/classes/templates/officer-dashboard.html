<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Officer Dashboard | CivicPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Poppins',sans-serif;background:#f4f7fb;}</style>
</head>
<body>
<div class="container py-4">
    <h2 class="fw-bold">Officer Dashboard</h2>
    <p class="text-muted">Manage assigned complaints and update progress.</p>
    <div class="card p-4 mt-4">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>Title</th>
                <th>Status</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="complaint : ${complaints}">
                <td th:text="${complaint.id}"></td>
                <td th:text="${complaint.title}"></td>
                <td th:text="${complaint.status}"></td>
                <td th:text="${complaint.category}"></td>
                <td>
                    <form th:action="@{'/complaints/' + ${complaint.id} + '/status'}" method="post" class="d-inline">
                        <select name="status" class="form-select form-select-sm d-inline w-auto">
                            <option>Pending</option>
                            <option>Assigned</option>
                            <option>In Progress</option>
                            <option>Resolved</option>
                            <option>Closed</option>
                        </select>
                        <button class="btn btn-sm btn-primary ms-2">Update</button>
                    </form>
                    <form th:action="@{'/complaints/' + ${complaint.id} + '/remarks'}" method="post" class="d-inline ms-2">
                        <input type="text" name="remarks" class="form-control form-control-sm d-inline w-auto" placeholder="Remarks">
                        <button class="btn btn-sm btn-outline-secondary">Add</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
